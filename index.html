<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>우리 임신 타임라인</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="dashboard">
    <main class="app-shell">
      <header class="top-band">
        <div class="top-copy">
          <p class="eyebrow">Dashboard</p>
          <h1>대시보드</h1>
          <p class="lead">
            현재 주차와 D-day, 지금 처리할 항목을 먼저 확인하고 필요한 페이지로 바로 이동합니다.
          </p>
        </div>
        <nav class="app-nav" aria-label="메인 메뉴">
          <a class="app-nav__item is-active" href="./index.html">대시보드</a>
          <a class="app-nav__item" href="./checklist.html">주차별 체크리스트</a>
          <a class="app-nav__item" href="./local-benefits.html">지역 혜택</a>
          <a class="app-nav__item" href="./updates.html">업데이트</a>
          <a class="app-nav__item" href="./settings.html">환경설정</a>
        </nav>
      </header>

      <section class="status-grid" aria-label="임신 상태 요약">
        <article>
          <span>오늘 기준</span>
          <strong id="todayText">-</strong>
        </article>
        <article>
          <span>현재 주차</span>
          <strong id="weekText">-</strong>
        </article>
        <article>
          <span>D-day</span>
          <strong id="ddayText">-</strong>
        </article>
        <article>
          <span>이번 주 핵심</span>
          <strong id="focusText">-</strong>
        </article>
      </section>

      <section class="summary-strip" aria-label="할 일 요약">
        <article>
          <span>지금 해당</span>
          <strong id="currentCount">-</strong>
        </article>
        <article>
          <span>앞으로 할 일</span>
          <strong id="upcomingCount">-</strong>
        </article>
        <article>
          <span>확인 필요</span>
          <strong id="needsCheckCount">-</strong>
        </article>
      </section>

      <section class="current-spotlight" aria-label="지금 해야 할 일">
        <div class="section-heading">
          <p>Now</p>
          <h2>지금 해야 할 일</h2>
        </div>
        <div class="current-spotlight-body">
          <div class="current-spotlight-copy">
            <strong id="currentSpotlightTitle">예정일을 입력하면 지금 해야 할 일을 보여줍니다.</strong>
            <p id="currentSpotlightDetail">현재 주차에 맞는 항목을 위로 끌어올려 바로 확인할 수 있습니다.</p>
          </div>
          <a class="button-link secondary" href="./checklist.html">체크리스트로 이동</a>
        </div>
        <div class="current-spotlight-list" id="currentSpotlightList"></div>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
