<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>대한민국 임산부 체크리스트 캘린더</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="calendar">
    <main class="app-shell">
      <header class="hero">
        <div class="hero__copy">
          <p class="eyebrow">Korea Pregnancy Checklist</p>
          <h1>디데이별 신청 포인트 캘린더</h1>
          <p class="lead">
            대한민국 임산부가 공식 제도 기준으로 적절한 시기에 신청하거나 등록하면 좋은 항목만 달력에 정리합니다.
          </p>
        </div>
        <nav class="app-nav" aria-label="메인 메뉴">
          <a class="app-nav__item is-active" href="./index.html">캘린더</a>
          <a class="app-nav__item" href="./settings.html">환경설정</a>
        </nav>
      </header>

      <section class="hero-metrics" aria-label="현재 상태 요약">
        <article>
          <span>현재 주차</span>
          <strong id="heroWeekText">-</strong>
        </article>
        <article>
          <span>D-day</span>
          <strong id="heroDdayText">-</strong>
        </article>
        <article>
          <span>다음 포인트</span>
          <strong id="heroFocusText">-</strong>
        </article>
      </section>

      <section class="calendar-panel">
        <div class="view-switch" role="tablist" aria-label="일정 보기 전환">
          <button type="button" id="calendarViewButton" class="is-active" role="tab" aria-selected="true">캘린더로 보기</button>
          <button type="button" id="timelineViewButton" class="secondary" role="tab" aria-selected="false">타임라인으로 보기</button>
        </div>
        <div class="calendar-surface" id="calendarSurface">
        <div class="calendar-toolbar">
          <button type="button" class="secondary" id="calendarPrevButton">이전 달</button>
          <div class="calendar-toolbar-copy">
            <strong id="calendarMonthText">-</strong>
            <span id="calendarRangeText">-</span>
          </div>
          <button type="button" class="secondary" id="calendarNextButton">다음 달</button>
        </div>
        <div class="calendar-weekdays" aria-hidden="true">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div class="timeline-surface is-hidden" id="timelineSurface">
          <div class="timeline-list" id="timelineList"></div>
        </div>
      </section>

      <section class="detail-layout">
        <section class="detail-panel">
          <div class="section-heading">
            <p>Detail</p>
            <h2 id="selectedDateText">-</h2>
          </div>
          <p class="section-caption" id="selectedDateMetaText">-</p>
          <div class="detail-list" id="selectedDateList"></div>
        </section>

        <aside class="sidebar-panel">
          <div class="section-heading">
            <p>Upcoming</p>
            <h2>가까운 신청 포인트</h2>
          </div>
          <div class="upcoming-list" id="nextMilestoneList"></div>
          <button type="button" class="secondary sidebar-panel__button" id="calendarTodayButton">오늘로 이동</button>
        </aside>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
