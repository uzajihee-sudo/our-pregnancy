<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>업데이트 | 우리 임신 타임라인</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="updates">
    <main class="app-shell">
      <header class="top-band top-band--compact">
        <div class="top-copy">
          <p class="eyebrow">Updates</p>
          <h1>업데이트</h1>
          <p class="lead">최근 추가된 혜택과 최신 배포 반영 내용을 별도로 확인합니다.</p>
        </div>
        <nav class="app-nav" aria-label="메인 메뉴">
          <a class="app-nav__item" href="./index.html">대시보드</a>
          <a class="app-nav__item" href="./checklist.html">주차별 체크리스트</a>
          <a class="app-nav__item" href="./local-benefits.html">지역 혜택</a>
          <a class="app-nav__item is-active" href="./updates.html">업데이트</a>
          <a class="app-nav__item" href="./settings.html">환경설정</a>
        </nav>
      </header>

      <section class="update-panel" aria-label="업데이트 확인">
        <div class="section-heading">
          <p>Updates</p>
          <h2>업데이트 확인</h2>
        </div>
        <div class="update-panel-body">
          <div class="update-panel-status">
            <div class="update-metric">
              <span>마지막 업데이트</span>
              <strong id="updateDateText">-</strong>
            </div>
            <div class="update-metric">
              <span>이번 업데이트 신규 혜택</span>
              <strong id="newBenefitsCount">-</strong>
            </div>
          </div>
          <div class="update-panel-actions">
            <p id="updateStatusText">최신 배포본과 새로 들어온 혜택을 확인합니다.</p>
            <button type="button" class="secondary" id="updateRefreshButton">업데이트 확인</button>
          </div>
        </div>
        <div class="new-benefits">
          <div class="new-benefits-head">
            <strong>이번 업데이트에 새로 들어온 혜택</strong>
          </div>
          <div class="current-spotlight-list" id="newBenefitsList"></div>
        </div>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
