<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>환경설정 | 대한민국 임산부 체크리스트 캘린더</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="settings">
    <main class="app-shell">
      <header class="hero hero--compact">
        <div class="hero__copy">
          <p class="eyebrow">Settings</p>
          <h1>환경설정</h1>
          <p class="lead">마지막 생리 시작일과 출산예정일 기준을 바꾸면 캘린더 일정이 다시 계산됩니다.</p>
        </div>
        <nav class="app-nav" aria-label="메인 메뉴">
          <a class="app-nav__item" href="./index.html">캘린더</a>
          <a class="app-nav__item is-active" href="./settings.html">환경설정</a>
        </nav>
      </header>

      <section class="settings-panel">
        <div class="section-heading">
          <p>Timeline Basis</p>
          <h2>기준일 설정</h2>
        </div>
        <div class="settings-form">
          <label>
            마지막 생리 시작일
            <input id="lmpInput" type="date" />
          </label>
          <label>
            출산예정일
            <input id="dueInput" type="date" />
          </label>
        </div>
        <div class="settings-actions">
          <button type="button" id="saveSettingsButton">저장</button>
          <button type="button" class="secondary" id="resetSettingsButton">기본값으로 되돌리기</button>
        </div>
        <p class="settings-status" id="settingsStatusText">설정을 저장하면 캘린더가 해당 기준으로 다시 계산됩니다.</p>
        <p class="settings-reviewed-at" id="settingsReviewedAt">-</p>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
